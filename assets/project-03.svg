<svg viewBox="0 0 1200 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="p3bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d2137"/>
      <stop offset="100%" stop-color="#0a192f"/>
    </linearGradient>
    <linearGradient id="p3ac" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#89dcff"/>
      <stop offset="100%" stop-color="#0b2d45"/>
    </linearGradient>
    <filter id="p3g" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>

  <rect width="1200" height="220" rx="10" fill="url(#p3bg)" stroke="#1d3a5a" stroke-width="1"/>
  <rect x="0" y="0" width="4" height="220" fill="url(#p3ac)"/>

  <text x="35" y="135" font-family="ui-monospace,monospace" font-size="86" font-weight="800" fill="#0a192f" stroke="#89dcff" stroke-width="1.4" opacity="0.85">03</text>

  <text x="190" y="55" font-family="ui-sans-serif,system-ui,sans-serif" font-size="22" font-weight="700" fill="#ccd6f6">Secure Contact Management Backend</text>
  <text x="190" y="78" font-family="ui-monospace,monospace" font-size="11" fill="#89dcff" letter-spacing="2.5">JWT  ·  BCRYPT  ·  EXPRESS  ·  MONGODB</text>

  <text x="190" y="110" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" fill="#8892b0">Most tutorial CRUD apps skip the boring parts of security.</text>
  <text x="190" y="128" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" fill="#8892b0">JWT auth, bcrypt hashing, protected routes, per-user data isolation.</text>

  <!-- security flow architecture -->
  <g transform="translate(190, 158)">
    <g font-family="ui-monospace,monospace" font-size="9" fill="#ccd6f6" text-anchor="middle">
      <g><rect x="0" y="0" width="60" height="22" rx="4" fill="#0a192f" stroke="#89dcff" stroke-width="0.8"/><text x="30" y="14">Request</text></g>
      <g transform="translate(80,0)"><rect x="0" y="0" width="68" height="22" rx="4" fill="#0a192f" stroke="#89dcff" stroke-width="0.8"/><text x="34" y="14">JWT verify</text></g>
      <g transform="translate(168,0)"><rect x="0" y="0" width="78" height="22" rx="4" fill="#0a192f" stroke="#89dcff" stroke-width="0.8"/><text x="39" y="14">User scope</text></g>
      <g transform="translate(266,0)"><rect x="0" y="0" width="78" height="22" rx="4" fill="#0a192f" stroke="#89dcff" stroke-width="0.8"/><text x="39" y="14">Mongo query</text></g>
      <g transform="translate(364,0)"><rect x="0" y="0" width="68" height="22" rx="4" fill="#0b2d45" stroke="#89dcff" stroke-width="1.2" filter="url(#p3g)"/><text x="34" y="14" fill="#89dcff">Response</text></g>
    </g>
    <g stroke="#89dcff" stroke-width="0.7" opacity="0.5" fill="none">
      <line x1="60" y1="11" x2="80" y2="11"/>
      <line x1="148" y1="11" x2="168" y2="11"/>
      <line x1="246" y1="11" x2="266" y2="11"/>
      <line x1="344" y1="11" x2="364" y2="11"/>
    </g>
  </g>

  <g transform="translate(960, 50)">
    <rect x="0" y="0" width="200" height="28" rx="14" fill="#0b2d45" stroke="#89dcff" stroke-width="0.8"/>
    <circle cx="16" cy="14" r="3.5" fill="#89dcff" filter="url(#p3g)">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="32" y="18" font-family="ui-monospace,monospace" font-size="10" fill="#89dcff" letter-spacing="1.2">LIVE  ·  RENDER</text>
  </g>

  <g transform="translate(960, 100)">
    <text x="0" y="0" font-family="ui-monospace,monospace" font-size="9" fill="#8892b0" letter-spacing="2">DEMONSTRATES</text>
    <text x="0" y="22" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" fill="#ccd6f6">▸ Auth from the ground up</text>
    <text x="0" y="42" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" fill="#ccd6f6">▸ Multi-tenant isolation</text>
    <text x="0" y="62" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" fill="#ccd6f6">▸ Secure-by-default habits</text>
  </g>
</svg>
