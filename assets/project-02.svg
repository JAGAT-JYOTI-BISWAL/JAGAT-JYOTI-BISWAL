<svg viewBox="0 0 1200 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="p2bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d2137"/>
      <stop offset="100%" stop-color="#0a192f"/>
    </linearGradient>
    <linearGradient id="p2ac" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bd93f9"/>
      <stop offset="100%" stop-color="#1a0533"/>
    </linearGradient>
    <filter id="p2g" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>

  <rect width="1200" height="220" rx="10" fill="url(#p2bg)" stroke="#2a1d4f" stroke-width="1"/>
  <rect x="0" y="0" width="4" height="220" fill="url(#p2ac)"/>

  <text x="35" y="135" font-family="ui-monospace,monospace" font-size="86" font-weight="800" fill="#0a192f" stroke="#bd93f9" stroke-width="1.4" opacity="0.85">02</text>

  <text x="190" y="55" font-family="ui-sans-serif,system-ui,sans-serif" font-size="22" font-weight="700" fill="#ccd6f6">NLP-Powered Semantic Notes Backend</text>
  <text x="190" y="78" font-family="ui-monospace,monospace" font-size="11" fill="#bd93f9" letter-spacing="2.5">NODE.JS  ·  FASTAPI  ·  COSINE SIMILARITY</text>

  <text x="190" y="110" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" fill="#8892b0">Keyword search misses notes you wrote with different words for the same idea.</text>
  <text x="190" y="128" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" fill="#8892b0">Notes are embedded on creation; queries match by meaning, not text.</text>

  <!-- two-service architecture -->
  <g transform="translate(190, 158)">
    <g font-family="ui-monospace,monospace" font-size="9" fill="#ccd6f6" text-anchor="middle">
      <g><rect x="0" y="0" width="78" height="22" rx="4" fill="#0a192f" stroke="#bd93f9" stroke-width="0.8"/><text x="39" y="14">Node API</text></g>
      <g transform="translate(98,0)"><rect x="0" y="0" width="86" height="22" rx="4" fill="#0a192f" stroke="#bd93f9" stroke-width="0.8"/><text x="43" y="14">FastAPI ML svc</text></g>
      <g transform="translate(204,0)"><rect x="0" y="0" width="78" height="22" rx="4" fill="#0a192f" stroke="#bd93f9" stroke-width="0.8"/><text x="39" y="14">Embeddings</text></g>
      <g transform="translate(302,0)"><rect x="0" y="0" width="78" height="22" rx="4" fill="#0a192f" stroke="#bd93f9" stroke-width="0.8"/><text x="39" y="14">MongoDB</text></g>
      <g transform="translate(400,0)"><rect x="0" y="0" width="68" height="22" rx="4" fill="#1a0533" stroke="#bd93f9" stroke-width="1.2" filter="url(#p2g)"/><text x="34" y="14" fill="#bd93f9">Match</text></g>
    </g>
    <g stroke="#bd93f9" stroke-width="0.7" opacity="0.5" fill="none">
      <line x1="78" y1="11" x2="98" y2="11"/>
      <line x1="184" y1="11" x2="204" y2="11"/>
      <line x1="282" y1="11" x2="302" y2="11"/>
      <line x1="380" y1="11" x2="400" y2="11"/>
    </g>
  </g>

  <g transform="translate(960, 50)">
    <rect x="0" y="0" width="200" height="28" rx="14" fill="#1a0533" stroke="#bd93f9" stroke-width="0.8"/>
    <circle cx="16" cy="14" r="3.5" fill="#bd93f9" filter="url(#p2g)">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="32" y="18" font-family="ui-monospace,monospace" font-size="10" fill="#bd93f9" letter-spacing="1.2">LIVE  ·  RENDER</text>
  </g>

  <g transform="translate(960, 100)">
    <text x="0" y="0" font-family="ui-monospace,monospace" font-size="9" fill="#8892b0" letter-spacing="2">DEMONSTRATES</text>
    <text x="0" y="22" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" fill="#ccd6f6">▸ Polyglot microservices</text>
    <text x="0" y="42" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" fill="#ccd6f6">▸ Vector similarity search</text>
    <text x="0" y="62" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" fill="#ccd6f6">▸ Clean service boundaries</text>
  </g>
</svg>
