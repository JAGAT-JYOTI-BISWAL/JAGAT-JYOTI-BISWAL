<svg viewBox="0 0 1200 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="p1bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d2137"/>
      <stop offset="100%" stop-color="#0a192f"/>
    </linearGradient>
    <linearGradient id="p1ac" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#64ffda"/>
      <stop offset="100%" stop-color="#064d3b"/>
    </linearGradient>
    <filter id="p1g" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>

  <rect width="1200" height="220" rx="10" fill="url(#p1bg)" stroke="#1e3a5f" stroke-width="1"/>
  <rect x="0" y="0" width="4" height="220" fill="url(#p1ac)"/>

  <!-- big number -->
  <text x="35" y="135" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="86" font-weight="800" fill="#0a192f" stroke="#64ffda" stroke-width="1.4" opacity="0.85">01</text>

  <!-- title block -->
  <text x="190" y="55" font-family="ui-sans-serif,system-ui,sans-serif" font-size="22" font-weight="700" fill="#ccd6f6">Context-Aware Intelligence System</text>
  <text x="190" y="78" font-family="ui-monospace,monospace" font-size="11" fill="#64ffda" letter-spacing="2.5">RAG  ·  FASTAPI  ·  EMBEDDINGS</text>

  <!-- description -->
  <text x="190" y="110" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" fill="#8892b0">Pure LLMs hallucinate. This runs the same query through two pipelines —</text>
  <text x="190" y="128" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" fill="#8892b0">pure LLM vs retrieval-augmented — and shows the difference, side-by-side.</text>

  <!-- mini architecture -->
  <g transform="translate(190, 158)">
    <g font-family="ui-monospace,monospace" font-size="9" fill="#ccd6f6" text-anchor="middle">
      <g><rect x="0" y="0" width="60" height="22" rx="4" fill="#0a192f" stroke="#64ffda" stroke-width="0.8"/><text x="30" y="14">Query</text></g>
      <g transform="translate(80,0)"><rect x="0" y="0" width="60" height="22" rx="4" fill="#0a192f" stroke="#64ffda" stroke-width="0.8"/><text x="30" y="14">Embed</text></g>
      <g transform="translate(160,0)"><rect x="0" y="0" width="68" height="22" rx="4" fill="#0a192f" stroke="#64ffda" stroke-width="0.8"/><text x="34" y="14">Retrieve</text></g>
      <g transform="translate(248,0)"><rect x="0" y="0" width="60" height="22" rx="4" fill="#0a192f" stroke="#64ffda" stroke-width="0.8"/><text x="30" y="14">Augment</text></g>
      <g transform="translate(328,0)"><rect x="0" y="0" width="55" height="22" rx="4" fill="#0a192f" stroke="#64ffda" stroke-width="0.8"/><text x="27.5" y="14">LLM</text></g>
      <g transform="translate(403,0)"><rect x="0" y="0" width="65" height="22" rx="4" fill="#064d3b" stroke="#64ffda" stroke-width="1.2" filter="url(#p1g)"/><text x="32.5" y="14" fill="#64ffda">Answer</text></g>
    </g>
    <g stroke="#64ffda" stroke-width="0.7" opacity="0.5" fill="none">
      <line x1="60" y1="11" x2="80" y2="11"/>
      <line x1="140" y1="11" x2="160" y2="11"/>
      <line x1="228" y1="11" x2="248" y2="11"/>
      <line x1="308" y1="11" x2="328" y2="11"/>
      <line x1="383" y1="11" x2="403" y2="11"/>
    </g>
  </g>

  <!-- right side: live badge + stats -->
  <g transform="translate(960, 50)">
    <rect x="0" y="0" width="200" height="28" rx="14" fill="#064d3b" stroke="#64ffda" stroke-width="0.8"/>
    <circle cx="16" cy="14" r="3.5" fill="#64ffda" filter="url(#p1g)">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="32" y="18" font-family="ui-monospace,monospace" font-size="10" fill="#64ffda" letter-spacing="1.2">LIVE  ·  RENDER</text>
  </g>

  <g transform="translate(960, 100)">
    <text x="0" y="0" font-family="ui-monospace,monospace" font-size="9" fill="#8892b0" letter-spacing="2">DEMONSTRATES</text>
    <text x="0" y="22" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" fill="#ccd6f6">▸ Observable retrieval</text>
    <text x="0" y="42" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" fill="#ccd6f6">▸ Dual-mode pipelines</text>
    <text x="0" y="62" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" fill="#ccd6f6">▸ Source-grounded answers</text>
  </g>
</svg>
