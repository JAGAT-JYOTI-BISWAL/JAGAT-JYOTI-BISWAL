<svg viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <defs>
    <radialGradient id="hbg" cx="65%" cy="50%" r="85%">
      <stop offset="0%" stop-color="#0d2137"/>
      <stop offset="55%" stop-color="#0a192f"/>
      <stop offset="100%" stop-color="#040b1a"/>
    </radialGradient>
    <linearGradient id="htitle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ccd6f6"/>
      <stop offset="100%" stop-color="#64ffda"/>
    </linearGradient>
    <linearGradient id="haccent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#64ffda" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#64ffda" stop-opacity="0"/>
    </linearGradient>
    <filter id="hglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
    <filter id="hglow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <rect width="1200" height="280" fill="url(#hbg)"/>

  <!-- helix watermark across the band -->
  <g opacity="0.07" stroke="#64ffda" stroke-width="1.2" fill="none">
    <path d="M 0,160 C 75,100 150,220 225,160 S 375,100 450,160 S 600,220 675,160 S 825,100 900,160 S 1050,220 1125,160 L 1200,160"/>
    <path d="M 0,160 C 75,220 150,100 225,160 S 375,220 450,160 S 600,100 675,160 S 825,220 900,160 S 1050,100 1125,160 L 1200,160"/>
  </g>

  <!-- right-side neural network -->
  <g transform="translate(820, 0)">
    <g stroke="#64ffda" stroke-width="0.8" opacity="0.35" fill="none">
      <line x1="60" y1="60" x2="180" y2="100"/>
      <line x1="60" y1="60" x2="120" y2="170"/>
      <line x1="60" y1="60" x2="220" y2="200"/>
      <line x1="180" y1="100" x2="320" y2="80"/>
      <line x1="180" y1="100" x2="320" y2="160"/>
      <line x1="180" y1="100" x2="220" y2="200"/>
      <line x1="120" y1="170" x2="220" y2="200"/>
      <line x1="220" y1="200" x2="320" y2="160"/>
      <line x1="320" y1="80" x2="320" y2="160"/>
    </g>
    <g fill="#64ffda">
      <circle cx="60" cy="60" r="3" opacity="0.7"/>
      <circle cx="180" cy="100" r="4" opacity="0.9" filter="url(#hglow)">
        <animate attributeName="opacity" values="0.9;0.4;0.9" dur="4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="120" cy="170" r="3" opacity="0.7"/>
      <circle cx="220" cy="200" r="3.5" opacity="0.8"/>
      <circle cx="320" cy="80" r="3" opacity="0.7"/>
      <circle cx="320" cy="160" r="5" opacity="1" filter="url(#hglow2)">
        <animate attributeName="r" values="5;7.5;5" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="1;0.5;1" dur="3s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <!-- left vertical accent -->
  <rect x="60" y="75" width="2" height="135" fill="url(#haccent)"/>

  <!-- title -->
  <text x="80" y="115" font-family="ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif" font-size="44" font-weight="800" fill="url(#htitle)" letter-spacing="-0.5">Jagat Jyoti Biswal</text>

  <text x="80" y="148" font-family="ui-monospace,'JetBrains Mono','SF Mono',Menlo,monospace" font-size="13" fill="#64ffda" letter-spacing="3">APPLIED AI ENGINEER  ·  BACKEND × INTELLIGENCE</text>

  <text x="80" y="185" font-family="ui-sans-serif,system-ui,sans-serif" font-size="15" fill="#8892b0">Building production AI systems for human health and longevity.</text>

  <!-- status indicator -->
  <g transform="translate(80, 225)">
    <circle cx="5" cy="0" r="4" fill="#64ffda" filter="url(#hglow)">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="20" y="4" font-family="ui-monospace,monospace" font-size="11" fill="#ccd6f6" letter-spacing="2">OPEN TO INTERNSHIPS  ·  INDIA &amp; REMOTE</text>
  </g>
</svg>
